<script>
/* ============================================================
   SHOLO GUTI — board graph, rules (optional capture), AI, render
   + অনলাইন মাল্টিপ্লেয়ার (Firebase Firestore)
   + প্রতিটি খেলোয়াড় নিজের ডিভাইসে নিজের গুটি সবসময় নিচে দেখবে (visual flip)
   ============================================================ */

/* ====== Firebase কনফিগারেশন ====== */
const firebaseConfig = {
  apiKey: "AIzaSyBf9ZkLHoU8YuORoDXVenDHSWsw36UdsbI",
  authDomain: "guti-f5b7e.firebaseapp.com",
  projectId: "guti-f5b7e",
  storageBucket: "guti-f5b7e.firebasestorage.app",
  messagingSenderId: "746495217692",
  appId: "1:746495217692:web:9ad36095ab6a74976e4fd9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ---------- 1. BOARD GRAPH (topology) ---------- */
function buildBoard() {
  const nodes = {};
  for (let c = 0; c < 5; c++) for (let r = 0; r < 5; r++) nodes[`m_${c}_${r}`] = { type:'main', c, r, gridY: r+2 };
  for (let i = 0; i < 3; i++) {
    nodes[`a${i}`] = { type:'a', i, gridY:0 };
    nodes[`b${i}`] = { type:'b', i, gridY:1 };
    nodes[`d${i}`] = { type:'d', i, gridY:7 };
    nodes[`e${i}`] = { type:'e', i, gridY:8 };
  }

  const lines = [];
  for (let r = 0; r < 5; r++) lines.push([0,1,2,3,4].map(c => `m_${c}_${r}`));
  for (let c = 0; c < 5; c++) { if (c === 2) continue; lines.push([0,1,2,3,4].map(r => `m_${c}_${r}`)); }
  lines.push(['m_0_0','m_1_1','m_2_2','m_3_3','m_4_4']);
  lines.push(['m_4_0','m_3_1','m_2_2','m_1_3','m_0_4']);
  lines.push(['a0','b0','m_2_0','m_3_1','m_4_2']);
  lines.push(['a2','b2','m_2_0','m_1_1','m_0_2']);
  lines.push(['a0','a1','a2']);
  lines.push(['b0','b1','b2']);
  lines.push(['e0','d0','m_2_4','m_3_3','m_4_2']);
  lines.push(['e2','d2','m_2_4','m_1_3','m_0_2']);
  lines.push(['e0','e1','e2']);
  lines.push(['d0','d1','d2']);
  lines.push(['a1','b1','m_2_0','m_2_1','m_2_2','m_2_3','m_2_4','d1','e1']);

  const adj = {}; for (const id in nodes) adj[id] = new Set();
  const captureMap = {};
  for (const line of lines) {
    for (let i = 0; i < line.length - 1; i++) { adj[line[i]].add(line[i+1]); adj[line[i+1]].add(line[i]); }
    for (let i = 0; i < line.length - 2; i++) { captureMap[`${line[i]}|${line[i+1]}`]=line[i+2]; captureMap[`${line[i+2]}|${line[i+1]}`]=line[i]; }
  }
  for (const id in adj) adj[id] = Array.from(adj[id]);
  return { nodes, adj, captureMap, lines };
}
const BOARD = buildBoard();
const ALL_IDS = Object.keys(BOARD.nodes);
const other = p => (p === 'blue' ? 'red' : 'blue');
function buildInitialBoard(bottomColor) {
  const topColor = other(bottomColor);
  const b = {};
  for (const id of ALL_IDS) { const gy = BOARD.nodes[id].gridY; b[id] = gy <= 3 ? topColor : (gy >= 5 ? bottomColor : null); }
  return b;
}

/* ---------- 2. RULES: optional capture, optional multi-jump ---------- */
function captureOptionsFor(board, nodeId, player) {
  const opp = other(player); const res = [];
  for (const v of BOARD.adj[nodeId]) if (board[v] === opp) {
    const landing = BOARD.captureMap[`${nodeId}|${v}`];
    if (landing && board[landing] === null) res.push({ type:'capture', from:nodeId, over:v, to:landing });
  }
  return res;
}
function simpleMovesFor(board, nodeId) {
  const res = [];
  for (const v of BOARD.adj[nodeId]) if (board[v] === null) res.push({ type:'move', from:nodeId, to:v });
  return res;
}
function generateLegalMoves(fs) {
  const { board, player, forced } = fs;
  if (forced) { const caps = captureOptionsFor(board, forced, player); const mv = caps.slice(); mv.push({type:'stop'}); return mv; }
  let moves = [];
  for (const id of ALL_IDS) if (board[id] === player) { moves.push(...simpleMovesFor(board,id)); moves.push(...captureOptionsFor(board,id,player)); }
  return moves;
}
function applyMove(fs, move) {
  if (move.type === 'stop') return { board: fs.board, player: other(fs.player), forced: null };
  const board = Object.assign({}, fs.board);
  board[move.to] = board[move.from]; board[move.from] = null;
  if (move.type === 'capture') {
    board[move.over] = null;
    const further = captureOptionsFor(board, move.to, fs.player);
    if (further.length > 0) return { board, player: fs.player, forced: move.to };
  }
  return { board, player: other(fs.player), forced: null };
}
function countPieces(board, player) { let n=0; for (const id of ALL_IDS) if (board[id]===player) n++; return n; }

/* ---------- 3. AI: minimax + alpha-beta + transposition table + iterative deepening ---------- */
const CENTRALITY = {}; for (const id of ALL_IDS) { const n=BOARD.nodes[id]; CENTRALITY[id]=10-(Math.abs(n.gridY-4)+Math.abs((BOARD.nodes[id].type==='main'?BOARD.nodes[id].c:2)-2)); }
function stateKey(fs) {
  let s = '';
  for (const id of ALL_IDS) { const v = fs.board[id]; s += v === 'blue' ? 'b' : (v === 'red' ? 'r' : '.'); }
  s += '|' + fs.player + '|' + (fs.forced || '');
  return s;
}
function evaluateBoard(board, aiPlayer) {
  const opp = other(aiPlayer); let mat=0, cen=0, mob=0, safety=0;
  for (const id of ALL_IDS) {
    const s = board[id];
    if (s === null) continue;
    let emptyN = 0; const neigh = BOARD.adj[id];
    for (let i=0;i<neigh.length;i++) if (board[neigh[i]]===null) emptyN++;
    let vulnerable = 0;
    const attacker = s === 'blue' ? 'red' : 'blue';
    for (const v of neigh) {
      if (board[v] === attacker) {
        const landing = BOARD.captureMap[`${v}|${id}`];
        if (landing && board[landing] === null) { vulnerable = 1; break; }
      }
    }
    if (s===aiPlayer) { mat++; cen+=CENTRALITY[id]; mob+=emptyN; if (vulnerable) safety--; }
    else { mat--; cen-=CENTRALITY[id]; mob-=emptyN; if (vulnerable) safety++; }
  }
  return mat*1000 + cen*2 + mob + safety*40;
}
function orderMoves(moves, ttMove) {
  return moves.slice().sort((a,b)=>{
    const aTT = ttMove && a.type===ttMove.type && a.from===ttMove.from && a.to===ttMove.to;
    const bTT = ttMove && b.type===ttMove.type && b.from===ttMove.from && b.to===ttMove.to;
    if (aTT && !bTT) return -1;
    if (bTT && !aTT) return 1;
    const sa = a.type==='capture'?0:(a.type==='move'?1:2);
    const sb = b.type==='capture'?0:(b.type==='move'?1:2);
    return sa-sb;
  });
}
class TimeoutErr extends Error {}
const TT_EXACT=0, TT_LOWER=1, TT_UPPER=2;
function minimax(fs, depth, alpha, beta, aiPlayer, deadline, counter, tt) {
  counter.n++;
  if ((counter.n & 511)===0 && Date.now()>deadline) throw new TimeoutErr();
  const key = stateKey(fs);
  const alphaOrig = alpha;
  let ttMove = null;
  const entry = tt.get(key);
  if (entry && entry.depth >= depth) {
    if (entry.flag === TT_EXACT) return entry.value;
    if (entry.flag === TT_LOWER) alpha = Math.max(alpha, entry.value);
    else if (entry.flag === TT_UPPER) beta = Math.min(beta, entry.value);
    if (alpha >= beta) return entry.value;
  }
  if (entry) ttMove = entry.bestMove;
  const moves0 = generateLegalMoves(fs);
  if (moves0.length===0) return fs.player===aiPlayer ? -100000-depth : 100000+depth;
  if (depth===0) return evaluateBoard(fs.board, aiPlayer);
  const moves = orderMoves(moves0, ttMove);
  const maximizing = fs.player===aiPlayer;
  let best = maximizing? -Infinity: Infinity;
  let bestMove = moves[0];
  for (const mv of moves) {
    const ns = applyMove(fs, mv);
    const val = minimax(ns, depth-1, alpha, beta, aiPlayer, deadline, counter, tt);
    if (maximizing) { if (val>best) { best=val; bestMove=mv; } if (val>alpha) alpha=val; }
    else { if (val<best) { best=val; bestMove=mv; } if (val<beta) beta=val; }
    if (beta<=alpha) break;
  }
  let flag = TT_EXACT;
  if (best <= alphaOrig) flag = TT_UPPER; else if (best >= beta) flag = TT_LOWER;
  tt.set(key, { depth, value: best, flag, bestMove });
  return best;
}
function chooseAIMove(fs, aiPlayer, timeBudgetMs) {
  const rootMoves = generateLegalMoves(fs);
  if (rootMoves.length===0) return null;
  if (rootMoves.length===1) return rootMoves[0];
  const deadline = Date.now()+timeBudgetMs;
  const tt = new Map();
  let bestMove = rootMoves[0]; const counter={n:0}; let depth=1; const MAXDEPTH=14;
  let prevBest = null;
  try {
    for (; depth<=MAXDEPTH; depth++) {
      const ordered = orderMoves(rootMoves, prevBest);
      let localBest=-Infinity, localMove=ordered[0], alpha=-Infinity, beta=Infinity;
      for (const mv of ordered) {
        const ns = applyMove(fs, mv);
        const val = minimax(ns, depth-1, alpha, beta, aiPlayer, deadline, counter, tt);
        if (val>localBest) { localBest=val; localMove=mv; }
        if (val>alpha) alpha=val;
      }
      bestMove = localMove; prevBest = localMove;
      if (Date.now()>deadline) break;
    }
  } catch(e) {}
  return bestMove;
}

/* ---------- 4. GAME STATE ---------- */
let game = {
  fs: null,
  mode: 'pvai',
  controlledBy: { blue:'human', red:'ai' },
  bottomColor: 'blue',
  selected: null,
  over: false,
  history: [],
  busy: false,
  noCaptureStreak: 0,
  // অনলাইন মোডের জন্য
  myColor: null,
  hostColor: null,
  roomCode: null,
  roomRef: null,
  unsubscribe: null,
  moveCount: 0,
  onlineInitialized: false,
  currentOverlay: null,
  // ভিজুয়াল ফ্লিপ — true হলে প্রতিটি নোডের স্ক্রিন-পজিশন উল্টে দেখানো হয়,
  // যাতে অনলাইন গেমে যে কোনো খেলোয়াড় নিজের ডিভাইসে নিজের গুটি সবসময় নিচে দেখে
  flip: false
};
const NO_PROGRESS_DRAW_LIMIT = 30;

function startGame(mode, bottomColor, aiColor) {
  game.mode = mode;
  game.bottomColor = bottomColor;
  if (mode === 'pvp') {
    game.controlledBy = { blue:'human', red:'human' };
  } else {
    game.controlledBy = {};
    game.controlledBy[aiColor] = 'ai';
    game.controlledBy[other(aiColor)] = 'human';
  }
  game.fs = { board: buildInitialBoard(bottomColor), player: bottomColor, forced: null };
  game.selected = null;
  game.over = false;
  game.history = [];
  game.busy = false;
  // লোকাল গেমে ফ্লিপের প্রয়োজন নেই — bottomColor অনুযায়ী বোর্ড আগে থেকেই সঠিকভাবে বানানো হয়
  game.flip = false;
  if (scene) { scene.setRoomCode(''); scene.repositionForFlip(); }
  scene && scene.fullRedraw();
  updateHUD('');
  document.getElementById('stopBtn').classList.remove('show');
  maybeTriggerAI();
}

function isAiTurn() { return !!game.fs && game.controlledBy[game.fs.player] === 'ai'; }

function updateHUD(msg) {
  if (!scene) return;
  scene.setCounts(countPieces(game.fs.board,'blue'), countPieces(game.fs.board,'red'));
  let turnText;
  if (game.over) {
    turnText = msg;
  } else if (game.mode === 'online') {
    turnText = (game.fs.player === game.myColor)
      ? ('আপনার পালা' + (game.fs.forced ? ' — আবার ক্যাপচার করুন বা থামুন' : ''))
      : 'প্রতিপক্ষের পালা...';
  } else if (game.mode === 'pvp') {
    turnText = (game.fs.player === 'blue' ? 'নীলের পালা' : 'লালের পালা') + (game.fs.forced ? ' — আবার ক্যাপচার করুন বা থামুন' : '');
  } else {
    if (isAiTurn()) turnText = 'AI ভাবছে...';
    else turnText = 'আপনার পালা' + (game.fs.forced ? ' — আবার ক্যাপচার করুন বা থামুন' : '');
  }
  scene.setTurnText(turnText);
  const stopBtn = document.getElementById('stopBtn');
  const myTurnForStop = game.mode === 'online' ? (game.fs.player === game.myColor) : !isAiTurn();
  const showStop = !game.over && !!game.fs.forced && myTurnForStop;
  stopBtn.classList.toggle('show', showStop);
}

function checkGameOver() {
  const moves = generateLegalMoves(game.fs);
  if (moves.length === 0) {
    game.over = true;
    const loserColor = game.fs.player;
    const winnerColor = other(loserColor);
    let msg;
    if (game.mode === 'pvp') {
      msg = (winnerColor === 'blue' ? 'নীল' : 'লাল') + ' জিতেছে! 🎉';
    } else {
      const winnerIsHuman = game.controlledBy[winnerColor] === 'human';
      msg = winnerIsHuman ? '🎉 আপনি জিতেছেন!' : '🤖 AI জিতেছে!';
    }
    updateHUD(msg);
    return true;
  }
  return false;
}

/* ---- human interaction ---- */
function humanClickNode(id) {
  if (!game.fs || game.over || game.busy) return;
  if (game.mode === 'online') { if (game.fs.player !== game.myColor) return; }
  else if (isAiTurn()) return;

  const board = game.fs.board;
  const legal = generateLegalMoves(game.fs);

  if (game.fs.forced) {
    if (id === game.fs.forced) { performMove({type:'stop'}); return; }
    const mv = legal.find(m => m.type==='capture' && m.to === id);
    if (mv) performMove(mv);
    return;
  }

  if (board[id] === game.fs.player) {
    const own = legal.filter(m => m.from === id);
    if (own.length === 0) { scene.flashInvalid(id); return; }
    game.selected = id;
    scene.showSelection(id, own);
    return;
  }

  if (game.selected) {
    const mv = legal.find(m => m.from === game.selected && m.to === id);
    if (mv) { performMove(mv); return; }
  }
  game.selected = null;
  scene.clearHighlights();
}

function performMove(mv) {
  if (game.mode === 'online') applyLocalMoveOnline(mv);
  else doMove(mv);
}

function doMove(mv) {
  game.busy = true;
  const ns = applyMove(game.fs, mv);
  game.history.push({ prevFs: game.fs });
  scene.animateMove(mv, () => {
    game.fs = ns;
    game.selected = null;
    game.busy = false;
    if (checkGameOver()) { scene.fullRedraw(); return; }
    if (ns.forced) {
      game.selected = ns.forced;
      const legal = generateLegalMoves(game.fs);
      scene.showSelection(ns.forced, legal);
      updateHUD('');
      maybeTriggerAI();
    } else {
      scene.clearHighlights();
      updateHUD('');
      maybeTriggerAI();
    }
  });
}

/* ---- AI turn ---- */
function maybeTriggerAI() {
  if (game.over) return;
  if (!isAiTurn()) return;
  game.busy = true;
  updateHUD('');
  setTimeout(() => {
    const aiColor = game.fs.player;
    const mv = chooseAIMove(game.fs, aiColor, 1800);
    if (!mv) { game.busy = false; checkGameOver(); return; }
    const ns = applyMove(game.fs, mv);
    game.history.push({ prevFs: game.fs });
    scene.animateMove(mv, () => {
      game.fs = ns;
      game.busy = false;
      if (checkGameOver()) { scene.fullRedraw(); return; }
      updateHUD('');
      maybeTriggerAI();
    });
  }, 250);
}

function undoLastTurn() {
  if (game.mode === 'online') { alert('অনলাইন মোডে Undo করা যায় না।'); return; }
  if (game.history.length === 0 || game.busy) return;
  let step = game.history.pop();
  game.fs = step.prevFs;
  if (game.mode === 'pvai') {
    while (game.history.length > 0 && game.controlledBy[game.fs.player] === 'ai') {
      step = game.history.pop();
      game.fs = step.prevFs;
    }
  }
  game.selected = null;
  game.over = false;
  scene.fullRedraw();
  updateHUD('');
}

/* ============================================================
   4b. অনলাইন মাল্টিপ্লেয়ার (Firebase Firestore)
   ============================================================ */
function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 5; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function ensureAuth() {
  return new Promise((resolve, reject) => {
    if (firebase.auth().currentUser) return resolve();
    firebase.auth().signInAnonymously().then(() => resolve()).catch(reject);
  });
}

async function createOnlineRoom(hostColor, overlay) {
  try {
    await ensureAuth();
    const uid = firebase.auth().currentUser.uid;
    let code, ref, exists = true;
    while (exists) {
      code = generateRoomCode();
      ref = db.collection('sholoGutiRooms').doc(code);
      const snap = await ref.get();
      exists = snap.exists;
    }
    const players = {}; players[hostColor] = { uid };
    await ref.set({
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      status: 'waiting',
      hostColor,
      players,
      board: null, player: null, forced: null,
      moveCount: 0, lastMove: null, winner: null
    });
    game.mode = 'online'; game.myColor = hostColor; game.hostColor = hostColor; game.roomCode = code;
    game.moveCount = 0; game.over = false; game.onlineInitialized = false;
    game.currentOverlay = overlay;
    showWaitingScreen(overlay, code);
    listenToRoom(code);
  } catch (e) {
    console.error(e);
    alert('রুম তৈরি করতে সমস্যা হয়েছে। Firebase কনফিগ ঠিক আছে কিনা যাচাই করুন।');
  }
}

async function joinOnlineRoom(code, overlay) {
  const errEl = document.getElementById('joinError');
  try {
    await ensureAuth();
    const uid = firebase.auth().currentUser.uid;
    const ref = db.collection('sholoGutiRooms').doc(code);
    let assignedColor = null;
    let hostColorCaptured = null;
    await db.runTransaction(async (tx) => {
      const snap = await tx.get(ref);
      if (!snap.exists) throw new Error('NOTFOUND');
      const data = snap.data();
      if (data.status !== 'waiting') throw new Error('FULL');
      hostColorCaptured = data.hostColor;
      assignedColor = other(data.hostColor);
      const board = buildInitialBoard(data.hostColor);
      const players = Object.assign({}, data.players);
      players[assignedColor] = { uid };
      tx.update(ref, { players, status: 'active', board, player: data.hostColor, forced: null, moveCount: 0 });
    });
    game.mode = 'online'; game.myColor = assignedColor; game.hostColor = hostColorCaptured; game.roomCode = code;
    game.moveCount = 0; game.over = false; game.onlineInitialized = false;
    game.currentOverlay = overlay;
    listenToRoom(code);
  } catch (e) {
    console.error(e);
    if (errEl) errEl.textContent = e.message === 'NOTFOUND' ? 'এই কোডে কোনো রুম পাওয়া যায়নি।' : 'রুমটি পূর্ণ অথবা সমস্যা হয়েছে।';
  }
}

function listenToRoom(code) {
  if (game.unsubscribe) game.unsubscribe();
  const ref = db.collection('sholoGutiRooms').doc(code);
  game.roomRef = ref;
  game.unsubscribe = ref.onSnapshot((snap) => {
    if (!snap.exists) return;
    handleRoomUpdate(snap.data());
  }, (err) => console.error('onSnapshot error', err));
}

function handleRoomUpdate(data) {
  if (data.status === 'waiting') return;

  if (!game.onlineInitialized) {
    if (game.currentOverlay) { game.currentOverlay.remove(); game.currentOverlay = null; }
    document.getElementById('stopBtn').classList.remove('show');
    game.fs = { board: data.board, player: data.player, forced: data.forced };
    game.moveCount = data.moveCount;
    game.controlledBy = {};
    game.controlledBy[game.myColor] = 'human';
    game.controlledBy[other(game.myColor)] = 'remote';
    game.selected = null;
    game.over = false;
    game.onlineInitialized = true;
    // এখানেই ঠিক হয় ফ্লিপ হবে কিনা — যদি আমার রং হোস্টের রং না হয়,
    // তাহলে বোর্ড উল্টে দেখানো হবে যাতে আমার গুটি সবসময় নিচে থাকে
    game.flip = (game.myColor !== data.hostColor);
    scene.setRoomCode('রুম কোড: ' + game.roomCode);
    scene.repositionForFlip();
    scene.fullRedraw();
    updateHUD('');
    return;
  }

  if (data.moveCount > game.moveCount) {
    if (data.lastMove) applyRemoteMove(data);
    else {
      game.fs = { board: data.board, player: data.player, forced: data.forced };
      game.moveCount = data.moveCount;
      scene.fullRedraw();
      updateHUD('');
    }
  }

  if (data.status === 'finished' && !game.over) {
    game.over = true;
    const msg = data.winner === game.myColor ? '🎉 আপনি জিতেছেন!' : '😢 আপনি হেরেছেন!';
    updateHUD(msg);
  }
}

function applyRemoteMove(data) {
  const mv = data.lastMove;
  game.busy = true;
  scene.animateMove(mv, () => {
    game.fs = { board: data.board, player: data.player, forced: data.forced };
    game.moveCount = data.moveCount;
    game.selected = null;
    game.busy = false;
    if (data.status === 'finished') {
      game.over = true;
      const msg = data.winner === game.myColor ? '🎉 আপনি জিতেছেন!' : '😢 আপনি হেরেছেন!';
      updateHUD(msg);
      scene.fullRedraw();
      return;
    }
    if (game.fs.forced && game.fs.player === game.myColor) {
      game.selected = game.fs.forced;
      const legal = generateLegalMoves(game.fs);
      scene.showSelection(game.fs.forced, legal);
    } else {
      scene.clearHighlights();
    }
    updateHUD('');
  });
}

function applyLocalMoveOnline(mv) {
  game.busy = true;
  const ns = applyMove(game.fs, mv);
  const overMoves = generateLegalMoves(ns);
  const isOver = overMoves.length === 0;
  const newMoveCount = game.moveCount + 1;
  const docUpdate = {
    board: ns.board, player: ns.player, forced: ns.forced,
    moveCount: newMoveCount, lastMove: mv,
    status: isOver ? 'finished' : 'active',
    winner: isOver ? other(ns.player) : null
  };
  game.moveCount = newMoveCount;
  if (game.roomRef) game.roomRef.update(docUpdate).catch(e => console.error('write failed', e));
  scene.animateMove(mv, () => {
    game.fs = ns;
    game.selected = null;
    game.busy = false;
    if (isOver) {
      game.over = true;
      const winnerColor = other(ns.player);
      const msg = winnerColor === game.myColor ? '🎉 আপনি জিতেছেন!' : '😢 আপনি হেরেছেন!';
      updateHUD(msg);
      return;
    }
    if (ns.forced) {
      game.selected = ns.forced;
      const legal = generateLegalMoves(game.fs);
      scene.showSelection(ns.forced, legal);
      updateHUD('');
    } else {
      scene.clearHighlights();
      updateHUD('');
    }
  });
}

function leaveOnlineRoom() {
  if (game.unsubscribe) { game.unsubscribe(); game.unsubscribe = null; }
  game.roomRef = null; game.roomCode = null; game.myColor = null; game.hostColor = null;
  game.onlineInitialized = false;
  game.flip = false;
  if (scene) { scene.setRoomCode(''); scene.repositionForFlip(); }
}

/* ============================================================
   5. PHASER RENDERING — 1080x1920 canvas, funnel-shaped board
   ============================================================ */
const CANVAS_W = 1080, CANVAS_H = 1920;
const MARGIN_X = 160, SP = 190;
const COL_X = [MARGIN_X, MARGIN_X+SP, MARGIN_X+2*SP, MARGIN_X+3*SP, MARGIN_X+4*SP];
const MAIN_ROW0_Y = 620;
const ROW_Y = [MAIN_ROW0_Y, MAIN_ROW0_Y+SP, MAIN_ROW0_Y+2*SP, MAIN_ROW0_Y+3*SP, MAIN_ROW0_Y+4*SP];
const OUTER_TOP_Y = MAIN_ROW0_Y - 2*SP, INNER_TOP_Y = MAIN_ROW0_Y - SP;
const INNER_BOT_Y = ROW_Y[4] + SP, OUTER_BOT_Y = ROW_Y[4] + 2*SP;
const OUTER_X = [COL_X[0], COL_X[2], COL_X[4]];
const INNER_X = [COL_X[1], COL_X[2], COL_X[3]];

/* px(id, flip) — flip=true হলে প্রতিটি নোডের স্ক্রিন-পজিশন উল্টে (mirror) দেওয়া হয়:
   main গ্রিডের সারি r -> 4-r উল্টানো হয়, এবং a<->e, b<->d রিং বদলানো হয়।
   বোর্ডের লাইন/জোড়া (grid lines/joints) গঠনতান্ত্রিকভাবে top-bottom symmetric,
   তাই সেগুলো একবারই আঁকা হয় (flip ছাড়া) — শুধু গুটি ও hit-area পজিশন flip অনুযায়ী বদলাতে হয়। */
function px(id, flip) {
  const n = BOARD.nodes[id];
  if (n.type === 'main') {
    const r = flip ? (4 - n.r) : n.r;
    return { x: COL_X[n.c], y: ROW_Y[r] };
  }
  let type = n.type;
  if (flip) {
    const mapType = { a:'e', b:'d', d:'b', e:'a' };
    type = mapType[type];
  }
  if (type === 'a') return { x: OUTER_X[n.i], y: OUTER_TOP_Y };
  if (type === 'b') return { x: INNER_X[n.i], y: INNER_TOP_Y };
  if (type === 'd') return { x: INNER_X[n.i], y: INNER_BOT_Y };
  if (type === 'e') return { x: OUTER_X[n.i], y: OUTER_BOT_Y };
}

const LINE_W = 12, JOINT_R = 8, PIECE_R = 30, PIECE_STROKE = 5, HIT_R = 60, SEL_R = 42, SEL_STROKE = 7, DEST_R = 26, DEST_STROKE = 7, CAP_DEST_COLOR = 0xff8a3d, MOVE_DEST_COLOR = 0x5cff7a;

let scene = null;

class MainScene extends Phaser.Scene {
  constructor() { super('main'); }
  create() {
    scene = this;
    this.pieceObjs = {};
    this.hitAreas = {};

    const bg = this.add.graphics();
    bg.fillGradientStyle(0xd4a366, 0xd4a366, 0x93602f, 0x93602f, 1);
    bg.fillRect(0, 0, CANVAS_W, CANVAS_H);
    for (let i = 0; i < 90; i++) {
      bg.lineStyle(2, 0x7a4a20, 0.10);
      const yy = Math.random() * CANVAS_H;
      bg.beginPath(); bg.moveTo(0, yy); bg.lineTo(CANVAS_W, yy + (Math.random()*26-13)); bg.strokePath();
    }
    bg.fillStyle(0x2a1608, 0.55);
    bg.fillRect(0, 0, CANVAS_W, 210);
    bg.fillRect(0, CANVAS_H-190, CANVAS_W, 190);

    this.titleText = this.add.text(CANVAS_W/2, 78, 'ষোল গুটি', {
      fontFamily: 'Segoe UI, sans-serif', fontSize: '64px', fontStyle: 'bold', color: '#f0c987'
    }).setOrigin(0.5).setShadow(0,3,'#000',6,true,true);

    this.turnText = this.add.text(CANVAS_W/2, 160, '', {
      fontFamily: 'Segoe UI, sans-serif', fontSize: '38px', fontStyle: 'bold', color: '#ffe9b0'
    }).setOrigin(0.5);

    this.roomCodeText = this.add.text(CANVAS_W/2, 210, '', {
      fontFamily: 'Segoe UI, sans-serif', fontSize: '26px', color: '#cbb090'
    }).setOrigin(0.5);

    this.blueCountText = this.add.text(150, CANVAS_H-95, 'নীল: 16', {
      fontFamily:'Segoe UI, sans-serif', fontSize:'40px', fontStyle:'bold', color:'#8fb6ff'
    }).setOrigin(0.5);
    this.redCountText = this.add.text(CANVAS_W-150, CANVAS_H-95, 'লাল: 16', {
      fontFamily:'Segoe UI, sans-serif', fontSize:'40px', fontStyle:'bold', color:'#ff9a8f'
    }).setOrigin(0.5);

    const lineGfx = this.add.graphics();
    lineGfx.lineStyle(LINE_W, 0x3a2411, 0.92);
    for (const line of BOARD.lines) {
      for (let i = 0; i < line.length - 1; i++) {
        const p1 = px(line[i], false), p2 = px(line[i + 1], false);
        lineGfx.lineBetween(p1.x, p1.y, p2.x, p2.y);
      }
    }
    const jointGfx = this.add.graphics();
    jointGfx.fillStyle(0x2a1808, 1);
    for (const id of ALL_IDS) { const p = px(id, false); jointGfx.fillCircle(p.x, p.y, JOINT_R); }

    this.highlightGfx = this.add.graphics().setDepth(1);

    for (const id of ALL_IDS) {
      const p = px(id, game.flip);
      const piece = this.add.circle(p.x, p.y, PIECE_R, 0xffffff);
      piece.setStrokeStyle(PIECE_STROKE, 0x1a1208);
      piece.setDepth(3);
      piece.visible = false;
      this.pieceObjs[id] = piece;

      const hit = this.add.circle(p.x, p.y, HIT_R, 0xffffff, 0);
      hit.setInteractive({ useHandCursor: true });
      hit.on('pointerdown', () => humanClickNode(id));
      hit.setDepth(4);
      this.hitAreas[id] = hit;
    }

    if (game.fs) this.fullRedraw();
  }

  setTurnText(t) { this.turnText.setText(t); }
  setRoomCode(t) { this.roomCodeText.setText(t); }
  setCounts(b, r) { this.blueCountText.setText('নীল: '+b); this.redCountText.setText('লাল: '+r); }

  /* game.flip পরিবর্তন হলে (অনলাইন রুম শুরু/শেষ হলে) সব গুটি ও hit-area নতুন পজিশনে সরানো হয় */
  repositionForFlip() {
    for (const id of ALL_IDS) {
      const p = px(id, game.flip);
      if (this.hitAreas[id]) this.hitAreas[id].setPosition(p.x, p.y);
      if (this.pieceObjs[id]) this.pieceObjs[id].setPosition(p.x, p.y);
    }
  }

  fullRedraw() {
    for (const id of ALL_IDS) {
      const owner = game.fs.board[id];
      const piece = this.pieceObjs[id];
      const p = px(id, game.flip);
      piece.setPosition(p.x, p.y);
      if (owner) { piece.visible = true; piece.setFillStyle(owner === 'blue' ? 0x2f6fe0 : 0xe03b3b); }
      else piece.visible = false;
    }
    this.clearHighlights();
    this.setCounts(countPieces(game.fs.board,'blue'), countPieces(game.fs.board,'red'));
  }

  clearHighlights() { this.highlightGfx.clear(); }

  showSelection(selId, moves) {
    this.clearHighlights();
    const g = this.highlightGfx;
    const sp = px(selId, game.flip);
    g.lineStyle(SEL_STROKE, 0xffe066, 1);
    g.strokeCircle(sp.x, sp.y, SEL_R);
    g.fillStyle(0xffe066, 0.22);
    g.fillCircle(sp.x, sp.y, SEL_R);
    for (const m of moves) {
      if (m.type === 'stop') continue;
      const dp = px(m.to, game.flip);
      const color = m.type === 'capture' ? CAP_DEST_COLOR : MOVE_DEST_COLOR;
      g.lineStyle(DEST_STROKE, color, 1);
      g.strokeCircle(dp.x, dp.y, DEST_R);
      g.fillStyle(color, 0.32);
      g.fillCircle(dp.x, dp.y, DEST_R);
    }
  }

  flashInvalid(id) {
    const p = px(id, game.flip);
    const g = this.add.graphics().setDepth(5);
    g.lineStyle(SEL_STROKE, 0xff4444, 1);
    g.strokeCircle(p.x, p.y, SEL_R);
    this.tweens.add({ targets: g, alpha: 0, duration: 350, onComplete: () => g.destroy() });
  }

  animateMove(mv, onDone) {
    this.clearHighlights();
    if (mv.type === 'stop') { onDone(); return; }
    const piece = this.pieceObjs[mv.from];
    const to = px(mv.to, game.flip);
    this.tweens.add({
      targets: piece, x: to.x, y: to.y, duration: 280, ease: 'Quad.easeInOut',
      onComplete: () => {
        this.pieceObjs[mv.from] = this.pieceObjs[mv.to];
        this.pieceObjs[mv.to] = piece;
        const p0 = px(mv.from, game.flip);
        this.pieceObjs[mv.from].setPosition(p0.x, p0.y);
        this.pieceObjs[mv.from].visible = false;
        if (mv.type === 'capture') {
          const capturedObj = this.pieceObjs[mv.over];
          this.tweens.add({
            targets: capturedObj, scale: 0, alpha: 0, duration: 240,
            onComplete: () => { capturedObj.visible = false; capturedObj.setScale(1); capturedObj.setAlpha(1); onDone(); }
          });
        } else onDone();
      }
    });
  }
}

const config = {
  type: Phaser.AUTO,

    const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
    if (!code) return;
    joinOnlineRoom(code, overlay);
  };
}

function showWaitingScreen(overlay, code) {
  overlay.innerHTML = `
    <h2>খেলোয়াড়ের অপেক্ষায়...</h2>
    <p>এই কোডটি আপনার বন্ধুকে পাঠান:</p>
    <div class="roomCodeBox">${code}</div>
    <div class="choiceRow" style="margin-top:18px;">
      <button class="secondary" id="cancelWait">বাতিল করুন</button>
    </div>
  `;
  document.getElementById('cancelWait').onclick = () => { leaveOnlineRoom(); buildStartOverlay(); };
}

window.addEventListener('load', () => {
  new Phaser.Game(config);
  buildStartOverlay();
  document.getElementById('newGameBtn').onclick = () => { leaveOnlineRoom(); buildStartOverlay(); };
  document.getElementById('undoBtn').onclick = undoLastTurn;
  document.getElementById('stopBtn').onclick = () => {
    if (!game.fs || !game.fs.forced || game.busy) return;
    if (game.mode === 'online' ? game.fs.player !== game.myColor : isAiTurn()) return;
    performMove({type:'stop'});
  };
});
</script>
</body>
</html>
